<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태양광사업 견적서</title>
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="태양광견적서" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
<style>
body{font-family:sans-serif;background:#f3f4f6;margin:0;padding:20px}
.wrap{max-width:430px;margin:auto;background:white;border-radius:20px;padding:20px}
h1{font-size:20px;margin-bottom:10px}
.section{margin-top:20px}
.title{font-weight:900;border-bottom:2px solid #111;padding-bottom:6px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.red{color:#dc2626;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.card{border:1px solid #ddd;border-radius:12px;padding:10px;background:#fafafa}
.card .k{font-size:12px;color:#666}
.card .v{font-size:16px;font-weight:900}
</style>
</head>
<body>

<div class="wrap">

<h1>태양광사업 견적서</h1>
<div class="row"><div>현장명</div><div>태산토목설계 사옥</div></div>
<div class="row"><div>작성일</div><div>2026-04-19</div></div>
<div class="row"><div>발전용량</div><div>100 kW</div></div>

<div class="section">
<div class="title">1. 태양광 발전사업 시 수익</div>

<div class="grid">
<div class="card"><div class="k">총 사업비</div><div class="v">110,000,000</div></div>
<div class="card"><div class="k">20년 총 순수익</div><div class="v red">182,400,000</div></div>
<div class="card"><div class="k">월 발전수익</div><div class="v">2,160,000</div></div>
<div class="card"><div class="k">필요자금</div><div class="v">11,000,000</div></div>
</div>

<div class="row"><div>자기자본투자율</div><div>10%</div></div>
<div class="row"><div>상환방식</div><div>원리금균등 10년 / 5%</div></div>
<div class="row"><div>대출금액</div><div>99,000,000</div></div>
<div class="row"><div>1~10년 순수익</div><div>1,020,000</div></div>
<div class="row"><div>10~20년 순수익</div><div>1,944,000</div></div>

</div>

<div class="section">
<div class="title">2. 지붕 임대 시 수익</div>
<div class="row"><div>월 임대료</div><div>500,000</div></div>
<div class="row"><div>연 임대료</div><div>6,000,000</div></div>
<div class="row"><div>20년 총 수익</div><div class="red">120,000,000</div></div>
</div>

</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
